bibliography:
  - bib/references_global.bib
  - bib/bluesky.bib
  - bib/discord.bib
  - bib/kwai.bib
  # - bib/reddit.bib
  # - bib/tiktok.bib
  # - bib/whatsapp.bib

# Render each chapter in its own scope so citations stay with the file
# file-scope: true

format:
  html:
    theme:
    - cosmo
      # - _brand.yml
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-copy: false
    embed-resources: false
  pdf:
    documentclass: report
    toc: true
    number-sections: true
    colorlinks: true

execute:
  freeze: auto
  echo: false
  warning: false
  message: false

# Jupyter kernel for Python code execution
jupyter: python3
