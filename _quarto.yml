project:
  type: book
  output-dir: _output

book:
  title: "Social Media Platform Evaluation"
  subtitle: "Comparative Analysis Across Regions"
  author: "Research Team"
  date: today
  chapters:
    - index.qmd
    - part: "Country Reports"
      chapters:
        - reports/reddit_br.qmd
  page-footer:
    center: "© 2025 Social Media Evaluation Project"

bibliography:
  - bib/references_global.bib

format:
  html:
    theme:
      - cosmo
      - _brand.yml
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    embed-resources: false
  pdf:
    documentclass: report
    toc: true
    number-sections: true
    colorlinks: true

execute:
  freeze: auto
  echo: false
  warning: false
  message: false

# Jupyter kernel for Python code execution
jupyter: python3
