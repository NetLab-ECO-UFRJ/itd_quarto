metadata:
  platform: Bluesky
  region_code: BRAZIL
  scope: UGC
  evaluation_date: 2025-10
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'yes'
  notes: The platform offers an API for collecting all UGC data. , https://docs.bsky.app/docs/api/app-bsky-feed-get-posts
    and https://docs.bsky.app/docs/api/app-bsky-feed-get-author-feed
- code: UGC_SC2
  selected_answer: 'yes'
  notes: 'All public content data can be extracted through the API. '
- code: UGC_SC3
  selected_answer: 'yes'
  notes: The platforms requires only a BlueSky account to access the API
- code: UGC_SC4
  selected_answer: 'no'
  notes: The platform does not provide a graphical interface for accessing or extracting
    public user-generated content data.
accessibility_answers:
- code: UGC_OC1
  selected_answer: 'no'
  notes: "This question is not applicable for Bluesky, because:\n* There is no specific\
    \ authentication for researchers.\n* There is no private accounts or posts at\
    \ Bluesky\n* There are no private groups or discussion forums at Bluesky. There\
    \ are only one-on-one messages on the platform and messages from the user can\
    \ be retrieved using API.\nSource: \n\nhttps://github.com/NetLab-ECO-UFRJ/transparency-index/blob/main/2025/user-generated-content-framework/BR/br_bluesky.ipynb\
    \ \n\nhttps://atproto.blue/en/latest/dm.html"
- code: UGC_OC2
  selected_answer: 'yes'
  notes: Responses to requests to the platform API provide the expected data in an
    appropriate format, without requiring redirection.
- code: UGC_OC3
  selected_answer: 'yes'
  notes: Actually, Bluesky does not requires tokens to use the API. Everything can
    be accessed easily only using standard login.
- code: UGC_OC4
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extrating data from an individual publication. '
- code: UGC_OC5
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extrating data from an individual author. '
- code: UGC_OC6
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extrating data based on search terms. '
- code: UGC_OC7
  selected_answer: 'yes'
  notes: "The only type of data that fits the description is the timestamp, which\
    \ comes in isoformat with microseconds and standardized to UTC. \n"
compliance_answers:
- code: UGC_OC10
  selected_answer: 'no'
  notes: 'The Bluesky''s official API lacks explanation about its methods. For exemple,
    here: https://docs.bsky.app/docs/api/chat-bsky-convo-get-messages there is not
    explanation about this endpoint.'
- code: UGC_OC11
  selected_answer: 'no'
  notes: 'Although Bluesky includes a link to its terms of use, it is not specific
    for API usage. There is also a Developer Guideline''s page, but it includes only
    "recomendations" to developers. Sources: https://bsky.social/about/support/tos,
    https://bsky.social/about/support/privacy-policy, https://bsky.social/about/support/copyright,
    https://docs.bsky.app/docs/support/developer-guidelines'
- code: UGC_OC12
  selected_answer: 'yes'
  notes: 'There is response scheme for all endpoints in the documentation. Source:
    https://docs.bsky.app/docs/api/app-bsky-actor-get-profile'
- code: UGC_OC13
  selected_answer: 'no'
  notes: 'The API documentation is available only in English. Source: https://docs.bsky.app/docs/get-started'
- code: UGC_OC14
  selected_answer: 'yes'
  notes: 'The platform details the quota and rate limits in a specific page on the
    documentation. Source: https://docs.bsky.app/docs/get-started'
- code: UGC_OC15
  selected_answer: 'no'
  notes: "The Bluesky API only provides a way to a post author self-label the post\
    \ content. \n* Check [SelfLabel definition](https://atproto.blue/en/latest/atproto/atproto_client.models.com.atproto.label.defs.html#atproto_client.models.com.atproto.label.defs.SelfLabel).\
    \ However, there is no specific label for AI-generated content."
- code: UGC_OC8
  selected_answer: no_or_not_applicable
  notes: We did not find a change log in official API documentation, only reference
    for a change log from a developer
- code: UGC_OC9
  selected_answer: 'yes'
  notes: 'It is possible to access the documentation without registration or login.
    Source: https://docs.bsky.app/'
completeness_answers:
- code: UGC_OC16
  selected_answer: 'no'
  notes: Although it could be argued that replies and quotes serve this function,
    Bluesky does not have dedicated comment features like other social media platforms
    analyzed in this study.
- code: UGC_OC17
  selected_answer: 'no'
  notes: Bluesky does not have temporary content features.
- code: UGC_OC18
  selected_answer: 'yes'
  notes: 'It is possible to extract historical data through the API. '
- code: UGC_OC19
  selected_answer: 'yes'
  notes: 'During our tests, we were able to obtain almost 10,000 (over 9,900) publications
    in only five minutes. '
consistency_answers:
- code: UGC_OC20
  selected_answer: 'yes'
  notes: 'The same request was made five times imediately after another and the same
    results were retrieved. '
- code: UGC_OC21
  selected_answer: 'yes'
  notes: 'All results are coherent considering the query. '
relevance_answers:
- code: UGC_OC22
  selected_answer: 'yes'
  notes: 'All parameters available on the user interface can be extracted from API. '
- code: UGC_OC23
  selected_answer: 'no'
  notes: 'Bluesky does not allow filtering based on publisher location. '
- code: UGC_OC24
  selected_answer: 'yes'
  notes: 'Bluesky allows filtering based on language. '
- code: UGC_OC25
  selected_answer: 'yes'
  notes: 'Bluesky allows filtering based on data. '
timeliness_answers:
- code: UGC_OC26
  selected_answer: 'yes'
  notes: 'Data can be extrated in near real time in Bluesky. '
