metadata:
  platform: Bluesky
  scope: UGC
  evaluation_date: 2025-10
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'yes'
  notes: The platform offers an API for collecting all UGC data via the [`get-posts`](https://docs.bsky.app/docs/api/app-bsky-feed-get-posts)
    and [`get-author-feed`](https://docs.bsky.app/docs/api/app-bsky-feed-get-author-feed)
    endpoints.
- code: UGC_SC2
  selected_answer: 'yes'
  notes: 'All public content data can be extracted through the API. '
- code: UGC_SC3
  selected_answer: 'yes'
  notes: The platform requires only a Bluesky account to access the API
- code: UGC_SC4
  selected_answer: 'no'
  notes: The platform does not provide a graphical interface for accessing or extracting
    public user-generated content data.
accessibility_answers:
- code: UGC_OC1
  selected_answer: 'not_applicable'
  notes: This question is not applicable for Bluesky because there is no specific
    authentication for researchers, there are no private accounts or posts, and there
    are no private groups or discussion forums. There are only one-on-one messages
    on the platform, which can be retrieved using the [`AT Protocol DM API`](https://atproto.blue/en/latest/dm.html).
- code: UGC_OC2
  selected_answer: 'yes'
  notes: Platform API responses provide the expected data in an appropriate format without requiring redirection.
- code: UGC_OC3
  selected_answer: 'yes'
  notes: Bluesky does not require OAuth tokens to use its API. Instead, API access is authenticated using standard login credentials.
- code: UGC_OC4
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extracting data from an individual publication. '
- code: UGC_OC5
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extracting data from an individual author. '
- code: UGC_OC6
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extracting data based on search terms. '
- code: UGC_OC7
  selected_answer: 'yes'
  notes: "The only type of data that fits the description is the timestamp, formatted\
    \ according to ISO 8601 with microsecond precision and standardized to UTC. \n"
compliance_answers:
- code: UGC_OC10
  selected_answer: 'no'
  notes: The Bluesky's official API lacks explanation about its methods. For example,
    the [`get-messages`](https://docs.bsky.app/docs/api/chat-bsky-convo-get-messages)
    endpoint has no explanation.
- code: UGC_OC11
  selected_answer: 'no'
  notes: Although Bluesky includes links to its [Terms of Service](https://bsky.social/about/support/tos),
    [Privacy Policy](https://bsky.social/about/support/privacy-policy), and [Copyright](https://bsky.social/about/support/copyright)
    policies, none are specific for API usage. There is also a [Developer Guidelines](https://docs.bsky.app/docs/support/developer-guidelines)
    page, but it includes only "recommendations" to developers.
- code: UGC_OC12
  selected_answer: 'yes'
  notes: There is a response scheme for all endpoints in the documentation, such as
    the [`get-profile`](https://docs.bsky.app/docs/api/app-bsky-actor-get-profile)
    endpoint.
- code: UGC_OC13
  selected_answer: 'no'
  notes: The [API documentation](https://docs.bsky.app/docs/get-started) is available
    only in English.
- code: UGC_OC14
  selected_answer: 'yes'
  notes: The platform details the quota and rate limits in the [Getting Started guide](https://docs.bsky.app/docs/get-started).
- code: UGC_OC15
  selected_answer: 'no'
  notes: The Bluesky API only provides a way for post authors to self-label their
    content using the [`SelfLabel`](https://atproto.blue/en/latest/atproto/atproto_client.models.com.atproto.label.defs.html#atproto_client.models.com.atproto.label.defs.SelfLabel)
    definition. However, there is no specific label for AI-generated content.The current user interface only allows adding pre-defined labels to posts with media and does not include "AI-generated content" among the available options.
- code: UGC_OC8
  selected_answer: no_or_not_applicable
  notes: We did not find a change log in official API documentation, only reference
    for a change log from a developer
- code: UGC_OC9
  selected_answer: 'yes'
  notes: The [Bluesky API documentation](https://docs.bsky.app/) is accessible without
    registration or login.
completeness_answers:
- code: UGC_OC16
  selected_answer: not_applicable
  notes: Although it could be argued that replies and quotes serve this function,
    Bluesky does not have dedicated comment features like other social media platforms
    analyzed in this study.
- code: UGC_OC17
  selected_answer: not_applicable
  notes: Bluesky does not have temporary content features.
- code: UGC_OC18
  selected_answer: 'yes'
  notes: 'It is possible to extract historical data through the API. '
- code: UGC_OC19
  selected_answer: 'yes'
  notes: 'We were able to obtain over 10,000 publications in less than ten minutes. '
consistency_answers:
- code: UGC_OC20
  selected_answer: 'yes'
  notes: 'The same request was made five times immediately after another and the same
    results were retrieved. '
- code: UGC_OC21
  selected_answer: 'yes'
  notes: 'All results are coherent considering the query. '
relevance_answers:
- code: UGC_OC22
  selected_answer: 'yes'
  notes: 'All parameters available on the user interface can be extracted from API. '
- code: UGC_OC23
  selected_answer: 'no'
  notes: 'Bluesky does not allow filtering based on publisher location. '
- code: UGC_OC24
  selected_answer: 'yes'
  notes: 'Bluesky allows filtering based on language. '
- code: UGC_OC25
  selected_answer: 'yes'
  notes: 'Bluesky allows filtering based on specific time periods. '
timeliness_answers:
- code: UGC_OC26
  selected_answer: 'yes'
  notes: 'Data can be extracted in near real time in Bluesky. '
