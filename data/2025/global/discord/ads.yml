special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: Traditionally, Discord had established itself as a platform that did not
    allow advertising anywhere in the world (Allyn, 2021). However, this scenario
    began to change in recent years (Discord, n.d.) – particularly in 2025, with the
    introduction of opt-in branded video ads tied to gaming perks (Adegbola, 2025).
    Nevertheless, the platform does not provide a public ad repository in any part
    of the world.
- code: AD_SC2
  selected_answer: 'no'
  notes: As the platform does not provide an ad repository anywhere in the world,
    this item does not apply to our assessment of transparency and data access in
    any context.
- code: AD_SC3
