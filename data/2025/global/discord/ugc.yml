  scope: UGC
  evaluation_date: 2025-10
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'no'
  notes: The Discord API exists, but it is primarily designed for the development
    of bots and applications intended for specific servers (Discord, 2025). To integrate
    these bots, server administrators must authorize their inclusion and define which
    channels they can access and what permissions they are granted. Once authorized,
    a bot can interact with textual content, such as messages and channel metadata,
    according to the intents enabled for it (Discord, n.d.-a; n.d.-b). Because it
    is a highly permissioned system with restricted and pre-authorized access, the
    Discord API is not suited for transparency initiatives or systematic research
    on public interest data.
- code: UGC_SC2
  selected_answer: 'no'
  notes: Discord does not provide an API that enables programmatic access to or extraction
    of public user-generated content data, either in Brazil or in any other country.
- code: UGC_SC3
  selected_answer: 'no'
  notes: Discord does not provide an API that enables programmatic access to or extraction
    of public user-generated content data, either in Brazil or in any other country.
- code: UGC_SC4
  selected_answer: 'no'
  notes: In the same way that it does not provide an API enabling programmatic access
    to or extraction of public user-generated content data, Discord likewise does
    not offer a graphical interface for this purpose.
