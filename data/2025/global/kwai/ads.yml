special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: Kwai does not provide an ad repository, either in Brazil or in any other
    country. At one point, the platform briefly introduced a transparency tool for
    political and electoral ads in Brazil, in order to comply with Resolution No.
    23.732/2024 of the Brazilian Electoral Court (TSE), but the tool was discontinued
    approximately one month after its launch (Nóbrega, 2024).
