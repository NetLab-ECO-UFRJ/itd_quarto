special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'no'
  notes: Kwai does not provide an API that enables programmatic access to or extraction
    of public user-generated content data, either in Brazil or in any other country.
    Only third-party, scraping-based APIs are available, which fall outside the scope
    of this work (see Hale et al., 2024).
- code: UGC_SC2
  selected_answer: 'no'
  notes: Kwai does not provide an API that enables programmatic access to or extraction
    of public user-generated content data, either in Brazil or in any other country
    (see Hale et al., 2024).
- code: UGC_SC3
  selected_answer: 'no'
  notes: Kwai does not provide an API that enables programmatic access to or extraction
    of public user-generated content data, either in Brazil or in any other country
    (see Hale et al., 2024).
- code: UGC_SC4
  selected_answer: 'no'
  notes: In the same way that it does not provide an API enabling programmatic access
    to or extraction of public user-generated content data, Kwai likewise does not
    offer a graphical interface for this purpose.
