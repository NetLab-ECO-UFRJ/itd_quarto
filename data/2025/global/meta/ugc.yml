special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'no'
  notes: Although Meta offers [Meta Content Library API](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api),
    extracting data is not allowed and violates the terms of usage. You can produce
    analysis and only the result of this analysis can be downloaded. See the [API
    overview](https://web.archive.org/web/20251010132741/https://developers.facebook.com/docs/content-library-and-api/content-library-api/overview)
    for details.
- code: UGC_SC2
  selected_answer: 'no'
  notes: Although Meta offers [Meta Content Library API](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api),
    extracting data is not allowed and violates the terms of usage. Moreover, the
    public content available is limited to a set of pages and profiles with a minimum
    number of followers or that has a verification badge. See the [API overview](https://web.archive.org/web/20251010132741/https://developers.facebook.com/docs/content-library-and-api/content-library-api/overview)
    for details.
- code: UGC_SC3
  selected_answer: 'no'
  notes: Although Meta offers [Meta Content Library API](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api),
    extracting data is not allowed and violates the terms of usage. See the [API
    overview](https://web.archive.org/web/20251010132741/https://developers.facebook.com/docs/content-library-and-api/content-library-api/overview)
    for details.
- code: UGC_SC4
  selected_answer: 'yes'
  notes: Meta offers [Meta Content Library User Interface](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api)
    that allows approved researchers to visualize and extract content generated by
    users on Facebook. This tool is more complete than what the API offers since
    it permits data extraction.
