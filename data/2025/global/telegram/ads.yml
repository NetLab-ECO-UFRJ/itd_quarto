special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: 'Telegram provides an API for third-party apps to display sponsored messages
    that replicate Telegram functionality. However, the API endpoints do not provide
    access to a comprehensive ad database. The ad-related endpoints return only active
    ads in known channels so that the Telegram clients can show them to their users.
    Telegram also offers the Telegram Ad Platform (ads.telegram.org) for creating
    and managing sponsored messages in public channels, enabling advertisers to manage
    their ads and budgets and monitor performance. However, this is also not a public
    ad repository for extracting data about all advertising content promoted on the
    platform.

    '
