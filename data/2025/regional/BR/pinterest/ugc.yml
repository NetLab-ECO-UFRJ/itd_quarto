  notes: Pinterest does not provide an API that enables programmatic access to or
    extraction of public user-generated content data, either in Brazil or in any other
    country
- code: UGC_SC4
  selected_answer: 'no'
  notes: In the same way that it does not provide an API enabling programmatic access
    to or extraction of public user-generated content data, Pinterest likewise does
    not offer a graphical interface for this purpose.
