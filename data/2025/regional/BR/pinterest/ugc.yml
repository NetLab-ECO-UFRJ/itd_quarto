special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'no'
  notes: 'Pinterest does not provide an API that enables programmatic access to or
    extraction of public user-generated content data, either in Brazil or in any other
    country. It only provides management for "pins" of the "operation user_account".
    The only possible exception could be the /search/partner/pins endpoint, but it
    is still in beta and was not considered. Also, the documentation provides insufficient
    explanations about its behavior, but seems to be related to request for content
    from brand partnerships. Source: https://developers.pinterest.com/docs/api/v5/search_partner_pins,
    https://developers.pinterest.com/docs/key-concepts/using-beta-and-restricted-features/
    and https://help.pinterest.com/en/business/article/approve-or-remove-paid-partnership-tags'
- code: UGC_SC2
