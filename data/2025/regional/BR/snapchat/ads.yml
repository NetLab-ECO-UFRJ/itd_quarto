metadata:
  platform: Snapchat
  region_code: BRAZIL
  scope: ADS
  evaluation_date: 2025-10
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: 'Snapchat mostly offers an Ads API for business purpose but provide a few
    endpoint for accessing its Ads Library. Nevertheless, these endpoint only retrieve
    ads from the European Union countries, as stated in its documentation. Also, it''s
    only possible to search for an advertiser ads and for the details of an specific
    ad (through its id). Source: https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/using-the-api'
- code: AD_SC2
  selected_answer: 'no'
  notes: 'Snapchat only provides an Ad Library interface for the European Union countries''
    ads. Like the API, it''s only possible to retrieve ads searching for advertisers,
    and get ads delivered in the last 12 months. Snapchat also offers csv files with
    all ads considered political and advocacy from 2018 to 2024 and a few ads that
    ran in Brazil can be found.  Source: https://adsgallery.snap.com/ https://www.snap.com/political-ads'
- code: AD_SC3
  selected_answer: 'no'
  notes: 'Snapchat doesn''t provide API or GUI for ads that ran in Brazil. Source:
    https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/using-the-api https://adsgallery.snap.com/'
accessibility_answers:
- code: AD_OC1
  selected_answer: 'no'
  notes: 'Snachat only provides an interface for ads that ran in the European Union
    countries. Snapchat doesn''t provide GUI for ads that ran in Brazil. Source: https://adsgallery.snap.com/'
