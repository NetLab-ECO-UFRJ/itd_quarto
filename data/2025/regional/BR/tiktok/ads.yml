special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: The platform provides an API to access its ad repository, but it only includes
    data from ads served to users in the European Economic Area, Switzerland and the
    United Kingdom. The TikTok Commercial Content Library (n.d.), launched in 2023
    to comply with the Digital Services Act (DSA), does not include data from other
    regions (TikTok, n.d.).
- code: AD_SC2
  selected_answer: 'no'
  notes: As the platform’s ad repository only includes data from ads served to users
    in the European Union (TikTok, n.d.), this item does not apply to the assessment
    of transparency and data access in the Brazilian context.
- code: AD_SC3
  selected_answer: 'no'
  notes: As the platform’s ad repository only includes data from ads served to users
