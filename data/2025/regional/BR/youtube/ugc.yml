metadata:
  platform: Youtube
  region_code: BRAZIL
  scope: UGC
  evaluation_date: 2025-11
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'yes'
  notes: |-
    The platform does have an API (YouTube Data v3 API) that allows the extraction of public UGC via the [YouTube Data API v3 documentation](https://developers.google.com/youtube/v3/docs).
- code: UGC_SC2
  selected_answer: 'yes'
  notes: 'YouTube allows searching the entire universe of public videos available
    via its API. Therefore, it is possible to use the official API to structure the
    programmatic collection of videos and search through any public channels or videos.

    '
- code: UGC_SC3
  selected_answer: 'yes'
  notes: |-
    The use of the YouTube API is limited by daily quotas per project in the Google Developers Console, but users can obtain credentials for free using the [getting started guide](https://developers.google.com/youtube/v3/getting-started), the [application registration steps](https://developers.google.com/youtube/registering_an_application), and the [quota cost reference](https://developers.google.com/youtube/v3/determine_quota_cost).
- code: UGC_SC4
  selected_answer: 'no'
  notes: The platform does not provide a graphical interface for accessing or extracting
    public user-generated content data.
accessibility_answers:
- code: UGC_OC1
  selected_answer: 'no'
  notes: |-
    YouTube does not provide any form of access to or extraction of non-public user-generated content data in Brazil; the available resources are limited to the public-facing [YouTube Research program](https://research.youtube/) and the standard API calls described in the [API usage guide](https://developers.google.com/youtube/v3/docs#call-the-api).
- code: UGC_OC2
  selected_answer: 'yes'
  notes: Responses to requests to the platform API provide the expected data in an
    appropriate format, without requiring redirection.
- code: UGC_OC3
  selected_answer: 'yes'
  notes: 'The collection does not require token renewal, but is limited to the daily
    quotas for each project accredited to the user.

    '
- code: UGC_OC4
  selected_answer: 'yes'
  notes: 'YouTube Data API v3 can return data from an individual publication as long
    as it is publicly available.

    '
- code: UGC_OC5
  selected_answer: 'yes'
  notes: |-
    Every content author has a YouTube channel, and the YouTube Data API v3 provides methods for retrieving data for specific authors. The search endpoint has a parameter to filter by channel ID, and another approach is to fetch a channel’s uploads playlist ID and then use the [playlistItems endpoint](https://developers.google.com/youtube/v3/docs/playlistItems) after discovering it via [search.list](https://developers.google.com/youtube/v3/docs/search/list).
- code: UGC_OC6
  selected_answer: 'yes'
  notes: |-
    The YouTube Data v3 API provides a search option for retrieving video data that matches specific search terms or expressions through the [search endpoint](https://developers.google.com/youtube/v3/docs/search).
- code: UGC_OC7
  selected_answer: 'yes'
  notes: |-
    The API uses internationally standardized, locale-neutral formats for all temporal and numerical data; all datetime values and video durations follow the ISO 8601 standard as shown in the [videos endpoint reference](https://developers.google.com/youtube/v3/docs/videos).
compliance_answers:
- code: UGC_OC10
  selected_answer: 'yes'
  notes: 'The YouTube API documentation provides clear examples of its use, including
    the different types of objects returned and the expected responses.

    '
- code: UGC_OC11
  selected_answer: 'yes'
  notes: |-
    The YouTube API documentation details its terms of use, including those specific to regions of the world, with links available at the bottom of the [API docs](https://developers.google.com/youtube/v3/docs) and in the [YouTube API terms](https://developers.google.com/youtube/terms).
- code: UGC_OC12
  selected_answer: 'yes'
  notes: |-
    Each method in the YouTube Data API v3 includes an example of its response format, such as the [videos resource representation](https://developers.google.com/youtube/v3/docs/videos#resource-representation) and the [videos.list response example](https://developers.google.com/youtube/v3/docs/videos/list#response).
- code: UGC_OC13
  selected_answer: 'yes'
  notes: |-
    Several translations of the documentation are available, including Portuguese, selectable from the upper-right corner of pages such as the [videos endpoint docs in Portuguese](https://developers.google.com/youtube/v3/docs/videos?hl=pt-br).
- code: UGC_OC14
  selected_answer: 'yes'
  notes: |-
    The YouTube Data API v3 has a default quota of 10,000 points per day, with each request consuming a portion of this quota. Different methods have different costs listed in their docs; quotas can be increased via the [quota overview](https://developers.google.com/youtube/v3/getting-started#quota), the [API audit request form](https://support.google.com/youtube/contact/yt_api_form), or participation in the [YouTube Researcher Program](https://research.youtube/), and costs are also shown in endpoint pages such as [comments.list](https://developers.google.com/youtube/v3/docs/comments/list).
- code: UGC_OC15
  selected_answer: 'no'
  notes: |-
    YouTube lacks API-level methods for detecting or labeling AI-generated content despite platform-level features; no official policy or technical specification appears in the YouTube Data API v3 documentation or terms of service, and the only related reference is the platform help article on [AI-generated content disclosures](https://support.google.com/youtube/answer/14328491).
- code: UGC_OC8
  selected_answer: 'yes'
  notes: |-
    YouTube implements a formal deprecation strategy with defined grace periods, removal dates, and migration guidance, as well as an RSS feed for updates. The Terms of Service (Section 14.2) states: "When YouTube intends to make backwards incompatible changes to YouTube API services, YouTube will announce those changes and try to continue to maintain the software code for six (6) months from the date such backwards incompatible changes are announced." Changes and deprecations are recorded on the [API services terms page](https://developers.google.com/youtube/terms/api-services-terms-of-service#youtube-api-services-terms-of-service) and the [revision history](https://developers.google.com/youtube/v3/revision_history).
- code: UGC_OC9
  selected_answer: 'yes'
  notes: |-
    The YouTube Data API v3 documentation can be accessed without authentication through the [public docs site](https://developers.google.com/youtube/v3/docs/).
completeness_answers:
- code: UGC_OC16
  selected_answer: 'yes'
  notes: |-
    YouTube Data API v3 provides an endpoint to extract comment threads from videos, each containing the top-level comment and up to 5 replies. If the top-level comment has more than 5 replies, they can be extracted using the API's comments endpoint, filtering by the top-level comment ID (parent comment ID), as described in the [comments implementation guide](https://developers.google.com/youtube/v3/guides/implementation/comments), [commentThreads.list](https://developers.google.com/youtube/v3/docs/commentThreads/list), and [comments endpoint](https://developers.google.com/youtube/v3/docs/comments).
- code: UGC_OC17
  selected_answer: 'no'
  notes: |-
    Currently, YouTube does not have built-in support for ephemeral content; the platform deprecated its Stories feature in June 2023 per the [official announcement](https://support.google.com/youtube/thread/217640760/youtube-stories-are-going-away-on-6-26-2023).
- code: UGC_OC18
  selected_answer: 'yes'
  notes: |-
    The search endpoint includes parameters for selecting a time range for videos, channels, and playlists, so the API allows collecting data from any videos available on the platform regardless of publication date. However, Developer Policies (Section III.E.4) demand API clients to “either delete or refresh stored resource metadata from that API after 30 days," preventing long-term historical analysis without continuous re-fetching, as outlined in the [developer policies](https://developers.google.com/youtube/terms/developer-policies#e.-handling-youtube-data-and-content). In practice, paginating a channel’s uploads playlist can return no more than roughly 20,000 videos, which may be insufficient for very large channels.
- code: UGC_OC19
  selected_answer: 'no'
  notes: The search list endpoint (for searching videos by query or channel ID) consumes
    100 of the 10,000 daily points per request. Since each request can only return
    up to 50 videos, the maximum number of videos one can get by this method, per
    day, is 5,000. Therefore, if a monitoring task depends on search queries, this
    approach is insufficient to gather more than 5,000 publications per day. Also,
    there is a cap for the number of result pages retrieved for a set of parameters
    when using the search list endpoint. Our tests had to change parameters to get
    more data pages and hit the daily quota limit; otherwise, the collected video
    limit would be even lower if we were only allowed to use fixed parameters on this
    endpoint. However, the API's daily quota is sufficient to monitor more than 10,000
    publications in 24 hours for other endpoints that do not depend on search (e.g.,
    videos.list or playlistItems.list).
consistency_answers:
- code: UGC_OC20
  selected_answer: 'no'
  notes: "The documentation does not guarantee that API results are consistently reproducible\
    \ and explicitly acknowledges approximations in key metrics. We made the same\
    \ request to the search list endpoint multiple times, using “relevance” for the\
    \ order parameter. The results differed in the order of the returned items. Additionally,\
    \ after deletion, YouTube videos and comments cannot be queried. \n"
- code: UGC_OC21
  selected_answer: 'no'
  notes: |-
    There are frequent inconsistencies, even in collections using fixed parameters. The YouTube API does not necessarily honor user-defined filters; for instance, the [relevanceLanguage parameter](https://developers.google.com/youtube/v3/docs/search/list) states that “results in other languages will still be returned if they are highly relevant to the search query term,” so the language filter acts as a soft preference rather than a strict constraint. In tests requesting videos in Portuguese, some results still used English descriptions, titles, and comments, indicating targeting for English-speaking audiences despite the filter.
relevance_answers:
- code: UGC_OC22
  selected_answer: 'no'
  notes: We ran tests comparing metrics from video and live streamings and confirmed
    that engagement metrics returned by the API are overall consistent with those
    on the user interface, although they are rounded and might not reflect the actual
    content available (e.g., total comment replies on the user interface can differ
    from the actual retrievable replies available via API). However, the API does
    not provide the metadata on AI-generated content, which is available through the
    web interface. Therefore, the data returned by the API does not correspond to
    the information displayed on the platform’s user interface at all levels of detail
- code: UGC_OC23
  selected_answer: 'no'
  notes: |-
    The API does not support filtering by channel/publisher location. This feature was deprecated from API v2 (see the [March 11, 2015 revision note](https://developers.google.com/youtube/v3/revision_history#march-11,-2015)). The current [search.list endpoint](https://developers.google.com/youtube/v3/docs/search/list) includes a location parameter for video geographic metadata and a regionCode parameter for content availability, neither of which filters by publisher location.
- code: UGC_OC24
  selected_answer: 'yes'
  notes: |-
    The API provides language-related filter parameters, but they influence relevance sorting rather than implementing strict filters. In tests requesting videos in Portuguese, some videos were in English; some pages were automatically translated while others were not, consistent with the [search.list parameters](https://developers.google.com/youtube/v3/docs/search/list#parameters).
- code: UGC_OC25
  selected_answer: 'yes'
  notes: |-
    The API provides comprehensive temporal filtering through dedicated date-time parameters documented for [search.list](https://developers.google.com/youtube/v3/docs/search/list).
timeliness_answers:
- code: UGC_OC26
  selected_answer: 'yes'
  notes: 'It is possible to extract data from the platform as soon as the content
    is published.

    '
