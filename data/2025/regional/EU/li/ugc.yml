- code: UGC_OC4
  selected_answer: 'no'
  notes: Although the LinkedIn Researcher API documentation suggests that data available
    includes "publications" ([[LinkedIn, n.d.]{.underline}](https://www.linkedin.com/help/linkedin/answer/a1645616)),,
    verification was not possible in practice, as API access was unavailable at the
    time of assessment due to a pending request and the absence of a response from
    the platform.
- code: UGC_OC5
  selected_answer: 'no'
  notes: Verification was not possible in practice, as API access was unavailable
    at the time of assessment due to a pending request and the absence of a response
    from the platform.
- code: UGC_OC6
  selected_answer: 'no'
  notes: The LinkedIn Researcher API documentation does not clearly provide an endpoint
    for extracting data based on search terms ([[LinkedIn, n.d.]{.underline}](https://www.linkedin.com/help/linkedin/answer/a1645616)).
    Verification was not possible in practice, as API access was unavailable at the
    time of assessment due to a pending request and the absence of a response from
    the platform.
- code: UGC_OC7
  selected_answer: 'no'
  notes: The LinkedIn Researcher API documentation does not provide any details on
    whether the API uses locale-neutral data representations ([[LinkedIn, n.d.]{.underline}](https://www.linkedin.com/help/linkedin/answer/a1645616)).
    Verification was not possible in practice, as API access was unavailable at the
    time of assessment due to a pending request and the absence of a response from
    the platform.
compliance_answers:
- code: UGC_OC10
  selected_answer: 'no'
  notes: The open access LinkedIn Researcher API documentation is not clearly written
    and exemplified ([[LinkedIn, n.d.]{.underline}](https://www.linkedin.com/help/linkedin/answer/a1645616)).
- code: UGC_OC11
  selected_answer: 'yes'
  notes: The LinkedIn Researcher API documentation links to the API terms of use ([[LinkedIn,
    2023]{.underline}](https://www.linkedin.com/legal/l/research-api-terms)),
- code: UGC_OC12
  selected_answer: 'no'
  notes: ''
- code: UGC_OC13
  selected_answer: 'no'
  notes: While LinkedIn Researcher API documentation is available in English, French,
    German, Spanish, Danish, Hungarian, Italian, Finnish, Italian, Romanian, Portuguese,
    Polish, Greek, Dutch, and Swedish ([[LinkedIn, 2023]{.underline}](https://www.linkedin.com/legal/l/research-api-terms)),
    it is not available in all of the 24 official languages of the EU ([[EU, n.d.]{.underline}](https://european-union.europa.eu/principles-countries-history/languages_en)).
- code: UGC_OC14
  selected_answer: 'no'
  notes: ''
- code: UGC_OC15
  selected_answer: 'no'
  notes: ''
- code: UGC_OC8
  selected_answer: 'no_or_not_applicable'
  notes: The LinkedIn Researcher API documentation does not provide a proper deprecation
    strategy ([[LinkedIn, n.d.]{.underline}](https://www.linkedin.com/help/linkedin/answer/a1645616)).
- code: UGC_OC9
  selected_answer: 'no'
  notes: The LinkedIn Researcher API documentation is published in open access, however
    the full documentation providing explanations and examples is not available in
    open access ([[LinkedIn, n.d.]{.underline}](https://www.linkedin.com/help/linkedin/answer/a1645616)).
    Given that previous researcher access documentation was provided to users after
    being approved ([[LinkedIn, 2023]{.underline}](https://www.linkedin.com/legal/l/research-api-terms)),
    it is likely that this documentation is not fully published in open access and
    therefore is not visible at the time of this assessment as full Researcher API
    access is not available.
