special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'researchers_only'
  notes: LinkedIn offers a \[Beta\] Researcher Access Program to comply with their
    legal requirements under article 40 of the European Union's Digital Services Act
    (DSA) ([[LinkedIn, n.d.]{.underline}](https://www.linkedin.com/help/linkedin/answer/a1645616)).
