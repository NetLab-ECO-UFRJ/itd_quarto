compliance_answers:
- code: AD_OC14
  selected_answer: 'no'
  notes: Removed ads only include text stating the content was removed or the page
    was disabled for not following advertising standards. No specific reason or date
    is provided.
- code: AD_OC15
  selected_answer: 'no'
  notes: While Meta automatically labels ads that use Meta's internal AI creative
    tools when they appear [[(Meta, n.d]{.underline}](https://www.meta.com/en-gb/help/artificial-intelligence/355108217670024/?srsltid=AfmBOorflhUZfITM_Eo_gMXEsc5VeJYtFXi7zcKGSiXM1sNTuniYzyVs&utm_source=chatgpt.com).),
    Meta does not officially have a policy on whether or how this is labelled within
    their Ad Library.
