- code: AD_OC6
  selected_answer: api
  notes: The platform provides the means to retrieve specific advertisers using IDs
    or names through both the GUI and the API. However, the functionality on the GUI
    is clunky. For example, the filter option often does not list all possible advertisers.
    The user needs to fetch their Page ID and paste in the GUI URL directly.
