- code: AD_OC8
  selected_answer: api
  notes: The time is offered in UTC. Timestamps are returned in coordinated universal
    time (UTC), respecting the standardized ISO 8601 formats. There is no automatic
    localised formatting, and locale data (e.g., language or region) is not attached
    unless explicitly requested or inferred. Multiple currencies are used, though
    they are specified in standard ISO currency codes, not localized formatted strings.
