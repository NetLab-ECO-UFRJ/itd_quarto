metadata:
  platform: Snapchat
  scope: ADS
  evaluation_date: 2025-12
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: 'In the EU, Snapchat provides an Ads Gallery API for advertisements and commercial
    content such as sponsored posts ([Snapchat documentation](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/Introduction)).
    However, in practice, its functionality is limited and difficult to use. Despite
    multiple attempts by different researchers, the API could not be successfully
    tested and consistently returned a "too many requests" error. In principle, the
    API should offer at least one endpoint for accessing public advertising data,
    but in practice this functionality does not appear to be operational. Moreover,
    the API''s scope is constrained: it is advertiser-centric, requiring searching
    by advertiser snapchat ID rather than brand name or creator. It is therefore not
    reliable for broad research use, and does not support comprehensive or historical
    extraction of advertising content served in the EU. The filtering is limited by
    advertiser, geography, and time (up to 12 months in the past, including live commercial
    content).'
- code: AD_SC2
  selected_answer: partial
  notes: Snapchat provides access to the Snap Ads Gallery which appears to provide
    access to EU ads which were delivered in the last 12 months as well as live commercial
    content ([Snapchat Ads Gallery](https://adsgallery.snap.com)). The option
    to extract data from the GUI does not appear to exist. In practice, despite multiple
    searches using different advertiser snapchat IDs, including brands such as "Mcdonalds",
    "Dior" or "Mcdo\_France" using various country filters including individual countries
    and "all EU countries", no data was returned by the GUI.
- code: AD_SC3
  selected_answer: 'no'
  notes: ''
accessibility_answers:
- code: AD_OC1
  selected_answer: 'no'
  notes: While ad visualisation appears possible in theory via the GUI, multiple tests
    returned no results.
- code: AD_OC2
  selected_answer: api
  notes: ''
- code: AD_OC3
  selected_answer: api
  notes: ''
- code: AD_OC4
  selected_answer: 'no'
  notes: The Ads Library API does not provide a form of authentication and does not
    rely on OAuth or other token-based access ([Snapchat API documentation](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/using-the-api)).
    It does not offer a renewal mechanism to support continuous or long-running data
    access.
- code: AD_OC5
  selected_answer: 'no'
  notes: In principle, the Ad Gallery API provides the GET `https://adsapi.snapchat.com/v1/ads_library/ads/{ad_id}`
    endpoint to retrieve data from a specific advertisement. In practice, the API
    does not yield any results due to a "too many requests" error.
- code: AD_OC6
  selected_answer: 'no'
  notes: In theory, this should be supported through both the GUI and the API; however,
    neither are functioning at the time of this assessment.
- code: AD_OC7
  selected_answer: 'no'
  notes: This is not supported by the GUI nor the API as all searches are by advertiser.
- code: AD_OC8
  selected_answer: 'no'
  notes: The API and Ad Gallery documentation does not provide any details about the
    format of data provided and this cannot be verified via the API nor the GUI as
    they do not appear to be functioning at the time of this assessment ([Snapchat API documentation](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/using-the-api)).
completeness_answers:
- code: AD_OC10
  selected_answer: 'no'
  notes: The Ad Gallery and Ad Gallery API documentations do not mention providing
    data about ads' funders ([Snapchat API documentation](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/using-the-api)).
    This cannot be verified via the API nor the GUI as they do not appear to be functioning
    at the time of this assessment.
- code: AD_OC11
  selected_answer: 'no'
  notes: The Ad Gallery and Ad Gallery API documentations appear to provide the "start
    and end date" of advertisements on the GUI and via the API ([Snapchat API documentation](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/using-the-api)).
    However, this cannot be verified via the API nor the GUI as they do not appear
    to be functioning at the time of this assessment.
- code: AD_OC12
  selected_answer: 'no'
  notes: The Ad Gallery API and GUI do not provide user engagement data. This cannot
    be verified via the API nor the GUI as they do not appear to be functioning at
    the time of this assessment.
- code: AD_OC13
  selected_answer: 'no'
  notes: The Ad Gallery API and GUI do not provide details about whether advertisers
    are verified. This cannot be verified via the API nor the GUI as they do not appear
    to be functioning at the time of this assessment.
- code: AD_OC9
  selected_answer: 'no'
  notes: The Ad Gallery and Ad Gallery API documentations do not provide any detailed
    explanation of the kind of data which could be visible on the GUI or extracted
    via the API about advertisers beyond "advertiser name" ([Snapchat API documentation](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/using-the-api)).
    This cannot be verified via the API nor the GUI as they do not appear to be functioning
    at the time of this assessment.
