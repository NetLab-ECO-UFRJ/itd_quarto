metadata:
  platform: X
  scope: ADS
  evaluation_date: 2025-12
special-criteria_answers:
- code: AD_SC1
  selected_answer: partial
  notes: This is available through the X API via Researcher's access for ads delivered
    in the European Union under Art. 40 of the Digital Services Act (DSA); however,
    access was not available at the time of assessment due to a pending request and
    the absence of a response from the platform., despite being requested within a
    reasonable timeframe ([X documentation](https://help.x.com/en/rules-and-policies/dsa-vetted-researchers)).
    There appears to also be the possibility of accessing this Ad Repository via the
    normal, non-researcher API tier ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)),
    therefore via the "Free" tier. However, this access is severely limited to 500
    posts per month ([X documentation](https://developer.x.com/en)) and is therefore
    considered to be equivalent to partial availability.
- code: AD_SC2
  selected_answer: partial
  notes: The X Ads Transparency Center was launched in 2023 to comply with the demands
    of the Digital Services Act (DSA) of the EU. For ads served in the EU, this Ad
    Transparency center includes critical information about funding, targeting and
    reach as well as the opportunity to export this information in comma separated
    values (CSV) format ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
    Partial availability is assessed due to the inability to extract data despite
    multiple attempts, even though the documentation indicates that such extraction
    should be possible in principle.
- code: AD_SC3
  selected_answer: 'no'
  notes: ''
accessibility_answers:
- code: AD_OC1
  selected_answer: partial
  notes: In principle, this information should be accessible via the graphical interface;
    however, it did not appear to be functioning correctly, as all searches attempted
    at the time of this assessment (December 2025) yielded empty csv files with nothing
    but a header. Moreover, theoretically, this could also be achieved via the API;
    however, this cannot be confirmed due to a lack of access at the of this assessment.
- code: AD_OC2
  selected_answer: api
  notes: The GUI is free but limited to ads delivered in the EU, while the API access
    is free but is subject to approval from X under article 40 of the DSA ([X documentation](https://docs.google.com/forms/d/e/1FAIpQLSdo0O-D6Kxa3cV4g1JLz2T_0Sk3hdEnTdv8dJmibagCnzJ7kg/viewform)).
- code: AD_OC3
  selected_answer: 'no'
  notes: Theoretically, this could also be achieved via the GUI and the API; however,
    this cannot be confirmed due to a lack of access to the API at the time of this
    assessment as well as due to difficulties extracting any data from the GUI despite
    multiple attempts.
- code: AD_OC4
  selected_answer: 'no'
  notes: Theoretically, this could also be achieved via the Researcher API; however,
    this cannot be confirmed due to a lack of access at the of this assessment. This
    does not appear to be possible via non-researcher access ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
    Moreover, currently, there is no publicly documented set of distinct rate limits
    for EU vetted researchers separate from standard X API developer rate limits,
    suggesting that the standard API limits may apply, meaning it may not always be
    possible to have continuous data collection due to stringent rate limits (1 request
    every 15 minutes; 100 tweets per month).
- code: AD_OC5
  selected_answer: 'no'
  notes: The GUI does not support searching for specific advertisements using a unique
    identifier. This does not appear to be supported by the API access to the Ad Repository
    ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
- code: AD_OC6
  selected_answer: 'no'
  notes: Theoretically, this could also be achieved via the GUI and the API; however,
    this cannot be confirmed due to a lack of access to the API at the time of this
    assessment as well as due to difficulties extracting any data from the GUI despite
    multiple attempts.
- code: AD_OC7
  selected_answer: 'no'
  notes: The GUI does not enable data extraction from the platform using search terms.
    This does not appear to be supported by the API access to the Ad Repository ([[X,
    n.d.]{.underline}](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
- code: AD_OC8
  selected_answer: 'no'
  notes: Official documentation does not explicitly confirm that the X Ads Repository
    uses locale-neutral data representation.
