  notes: 'This cannot be confirmed due to a lack of access at time the of this assessment.'
- code: AD_OC13
  selected_answer: 'no'
  notes: Neither the GUI or the API are documented as indicating whether advertisers were
    verified at the time their ads were served ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
    This cannot be verified due to a lack of access to the API at the time of
    this assessment as well as due to difficulties extracting any data from the GUI
    despite multiple attempts.
    It is notable that, in general, X departs from online verification-labelling
    conventions by treating verification as a paid feature, making verification unusable
    on the platform ([EU Commission](https://ec.europa.eu/commission/presscorner/detail/en/ip_24_3761)).
compliance_answers:
- code: AD_OC14
  selected_answer: 'no'
  notes: Theoretically, this is available via the GUI, as the headers "Facts And Circumstances
    Of Removal, Enforcement Action, Statement Of Reason" appear; however no data has
    been successfully collected so far.
    Theoretically, this could also be achieved via the API; however, this cannot be
    confirmed due to a lack of access to the API at the time of this assessment.
- code: AD_OC15
  selected_answer: 'no'
  notes: The GUI and the API do not indicate whether ad content was generated using
    artificial intelligence ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
    Moreover, this cannot be verified due to a lack of access to the API at the time of
    this assessment as well as due to difficulties extracting any data from the GUI
    despite multiple attempts.
- code: AD_OC16
  selected_answer: both
  notes: Though minimal, the GUI and API documentation is open access ([[X,
    n.d.]{.underline}](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
- code: AD_OC17
  selected_answer: 'no'
  notes: The GUI and API documentation are very minimal and provide no examples nor
    clear explanations about the fields provided ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
- code: AD_OC18
  selected_answer: 'no'
  notes: The X Ad Repository documentation does not include or link to its terms of
    use ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency),
    [X documentation](https://ads.twitter.com/ads-repository?ref=BTC)).
- code: AD_OC19
  selected_answer: 'no'
  notes: The X Ad Repository documentation is only available in English ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency),
    [X documentation](https://ads.twitter.com/ads-repository?ref=BTC)).
- code: AD_OC20
  selected_answer: 'no'
  notes: The API documentation does not describe any deprecation strategies nor any
    changelogs or migration instructions ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
- code: AD_OC21
  selected_answer: 'no'
  notes: The API documentation does not detail any response formats ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
- code: AD_OC22
  selected_answer: 'no'
  notes: The API documentation does not detail any applicable rate or daily limits
    ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
