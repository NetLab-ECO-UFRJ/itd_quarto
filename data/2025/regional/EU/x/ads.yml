metadata:
  platform: X
  scope: ADS
  evaluation_date: 2025-12
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: According to X, this is available through the X API via Researcher's access for ads delivered
    in the European Union under Art. 40 of the Digital Services Act (DSA); however,
    access was not available at the time of assessment due to a pending request and
    the absence of a response from the platform, despite being requested within a
    reasonable timeframe ([X documentation](https://help.x.com/en/rules-and-policies/dsa-vetted-researchers)).
- code: AD_SC2
  selected_answer: 'no'
  notes: The X Ads Transparency Center was launched in 2023 to comply with the demands
    of the Digital Services Act (DSA) of the EU. For ads served in the EU, this Ad
    Transparency center would include critical information about funding, targeting and
    reach available in comma separated values (CSV) format files ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
    This is the only way to get access to information about the ads, since X does not
    show the data directly in the GUI. However, we could not extract data despite
    multiple attempts, even though the documentation indicates that such extraction
    should be possible in principle. Multiple prominent advertisers such as Amazon,
    Apple and Netflix have been tested for countries such as France, Germany and Belgium,
    for varying periods of time including custom date, today, yesterday, the past
    7 days, this quarter, the last quarter and the past year. None of these
    extraction have yielded empty csv files with nothing but a header. This is consistent
    with the recent findings from the EU Commission, fining X for violations under the DSA, which includes
    "excessive delays in processing" data from its Ad Repository, thus undermining
    its purpose [[(EC, 2025]{.underline}](https://ec.europa.eu/commission/presscorner/detail/en/ip_25_2934)).
- code: AD_SC3
  selected_answer: 'no'
  notes: 'This cannot be verified due to a lack of access to the API at the time of
    this assessment as well as due to difficulties extracting any data from the GUI
    despite multiple attempts.'
accessibility_answers:
- code: AD_OC1
  selected_answer: 'no'
  notes: In principle, this criteria could be achieved via the file generated in
    the graphical interface; however, it is not functioning correctly,
    as all searches attempted at the time of this assessment (December 2025) yielded
    empty csv files with nothing but a header. Moreover, theoretically, this could
    also be achieved via the API; however, this cannot be confirmed due to a lack of
    access at the time of this assessment.
- code: AD_OC2
  selected_answer: both
  notes: The GUI is free and limited to ads delivered in the EU, while the API access
    is free and subject to approval from X under article 40 of the DSA ([X documentation](https://docs.google.com/forms/d/e/1FAIpQLSdo0O-D6Kxa3cV4g1JLz2T_0Sk3hdEnTdv8dJmibagCnzJ7kg/viewform)).
