    this assessment as well as due to difficulties extracting any data from the GUI
    despite multiple attempts.
completeness_answers:
- code: AD_OC9
  selected_answer: 'no'
  notes: 'According to the official documentation, the X Ads Transparency Center "includes
    the following: Advertiser, Funding Entity, the Advertiser''s Main Targeting Parameters
    for the advertisement, Impression, and Reach of Ad to provide transparency around
    advertisements on the platform" ([X documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency)).
    In principle, this criteria could be achieved via the file generated in
    the graphical interface; however, it is not functioning correctly,
    as all searches attempted at the time of this assessment (December 2025) yielded
    empty csv files with nothing but a header. Moreover, theoretically, this could
    also be achieved via the API; however, this cannot be confirmed due to a lack of
    access at the time of this assessment.'
