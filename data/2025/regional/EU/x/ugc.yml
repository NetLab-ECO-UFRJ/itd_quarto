completeness_answers:
- code: UGC_OC16
  selected_answer: 'yes'
  notes: While not exactly comments, the API's search feature allows users to search
    for posts made in reply to a specific message.
- code: UGC_OC17
  selected_answer: 'yes'
  notes: 'Data from Spaces is available, though it does not include the content itself:
    [[https://docs.x.com/x-api/spaces/search-spaces]{.underline}](https://docs.x.com/x-api/spaces/search-spaces).'
- code: UGC_OC18
  selected_answer: 'no'
  notes: The free tier of the API only allows retrieving posts made in the previous
    12 months. Older data is available in the paid versions of the API.
- code: UGC_OC19
  selected_answer: 'no'
  notes: That is far beyond the free tier limit (100 publications per month), and
    even the basic version (15,000 publications per month), at 200 USD per month,
    is not enough. That level of access is only obtainable in the API's pro version
    (1 million publications per month), priced at 5,000 USD per month.
