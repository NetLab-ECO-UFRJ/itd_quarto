- code: AD_OC18
  selected_answer: api
  notes: Terms of Service are linked in the API documentation; however, no explicit
    terms are mentioned. It simply states that available ads will have the content
    of the ad creative, which is marked as subject to their Terms of Service.
- code: AD_OC19
  selected_answer: api
  notes: You have to be logged in to change the language.
- code: AD_OC20
  selected_answer: true
  notes: 'Updates are described in the release notes, and include future deprecations:
    https://www.facebook.com/ads/library/api/releasenotes'
- code: AD_OC21
  selected_answer: 'not_applicable'
  notes: There is only one endpoint. Only one example of its usage is provided. It
    does not cover possible errors or details about using the possible parameters.
- code: AD_OC22
  selected_answer: 'not_applicable'
  notes: No information about rate limits is available in the ad repository API documentation.
    Inside the answer to a FAQ there is a link to broader API documentation, which
    includes a page about rate limits, but it does not mention the ad repository.
