metadata:
  platform: Instagram
  scope: UGC
  evaluation_date: 2025-10
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'no'
  notes: Although Meta provides the [Meta Content Library API](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api), programmatically extracting public user-generated content to the users’ infrastructure is not permitted and violates its [terms and conditions](https://transparency.meta.com/researchtools/product-terms-meta-research/). Analyses may be conducted using only aggregated data and within the pre-approved "Secure Research Environment". Therefore, the Meta Content Library API has been considered not available for research purposes in our evaluation.
- code: UGC_SC2
  selected_answer: 'no'
  notes: The public content available for analysis is restricted to a subset of pages and profiles that either meet a minimum [follower threshold](https://web.archive.org/web/20251010132741/https://developers.facebook.com/docs/content-library-and-api/content-library-api/overview) or are otherwise verified by the platform.
- code: UGC_SC3
  selected_answer: 'no'
  notes: There are no costs associated with accessing the [Meta Content Library API](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api) through Meta’s Secure Research Environment (SRE). However, access through [SOMAR’s Virtual Data Enclave](https://www.icpsr.umich.edu/sites/somar/meta-content-library) has been [subject to fees](https://bellingcat.gitbook.io/toolkit/more/all-tools/meta-content-library) since January 2026. Nonetheless, this transparency resource is considered unavailable for research purposes, as it provides only aggregated results and does not allow structured data extraction to users’ own infrastructure.
- code: UGC_SC4
  selected_answer: researchers_only
  notes: In addition to the Meta Content Library API, the company also provides the [Meta Content Library User Interface](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api), which enables approved researchers to visualize and extract granular, structured data on user-generated content across Meta platforms. The tool allows [data extraction](https://developers.facebook.com/docs/content-library-and-api/content-library) from Instagram posts made by business and creator accounts with at least 25,000 followers, personal accounts with at least 25,000 followers, and any business, creator, or personal account with a verified badge.
