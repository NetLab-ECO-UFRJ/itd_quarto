metadata:
  platform: YouTube
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: 'Google provides access to data from its [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) via [BigQuery](https://cloud.google.com/bigquery?hl=pt_br), but no data is available for ads shown in Brazil.'
- code: AD_SC2
  selected_answer: partial
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR), a web-based interface that allows users to search for and view ads across Google products, including YouTube. The tool lets users filter results by advertiser, date range, region, and ad format to explore advertising content. However, in Brazil, the data export feature is limited to ads labeled as political that were shown to users in the country.
- code: AD_SC3
  selected_answer: partial
  notes: The [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) allows the extraction of data on ads labeled as political that were served at any point over the past seven years. However, it does not provide export capabilities for other types of ads, and our tests using the [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br) did not return any results.
  accessibility_answers:
- code: AD_OC1
  selected_answer: partial
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR), a web-based interface that allows users to search for and view ads across Google products, including YouTube. It includes ads from verified advertisers shown within the past 365 days (or up to seven years for ads labeled as political), as well as ads from unverified advertisers in Europe and Turkey. As a result, availability for Brazilian users is more limited due to restrictions on unverified advertisers.
- code: AD_OC2
  selected_answer: both
  notes: The [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) web interface is publicly available and free to use, with no payment or subscription required. The same applies to extracting ad data via the [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br), but we were unable to properly verify the availability of data on ads served to users in Brazil.
- code: AD_OC3
  selected_answer: 'no'
  notes: Although it is possible to extract structured data on ads labeled as political in Brazil through the [Ads Transparency Center GUI](https://adstransparency.google.com/?hl=pt-BR&region=BR), it is not possible to retrieve any structured information on the content of those ads, as the output only provides a URL linking to each ad’s page on the Ads Transparency Center.
- code: AD_OC4
  selected_answer: 'no'
  notes: As we were not able to assess any data on ads served to users in Brazil through the [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br), authentication mechanisms could not be further evaluated.
- code: AD_OC5
  selected_answer: gui
  notes: It is possible to retrieve data for a specific ad through the [Ads Transparency Center](https://adstransparency.google.com). Although the interface does not allow users to search for an ad by its ID, a specific ad can be accessed directly via its URL, which can be easily formatted.
- code: AD_OC6
  selected_answer: gui
  notes: The [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) allows users to search by advertiser name or domain to view ads from verified advertisers. However, advertiser pages cannot be retrieved if verification is incomplete or if no ads were shown in the past 365 days. In theory, it is possible to return data on ads from specific advertisers via the [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br), but we were unable to assess any data on ads served to users in Brazil through it.
- code: AD_OC7
  selected_answer: 'no'
  notes: The [Google Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) does not allow ads to be retrieved using search terms.
- code: AD_OC8
  selected_answer: 'no'
  notes: The platform displays data, such as dates, using locale-specific formats.
    For example, the interface shows “2 de nov. de 2025”, which follows Portuguese
    localization conventions. This indicates that the data presentation is localized
    based on the user’s region or language settings, rather than being standardized
    or locale-neutral.
completeness_answers:
- code: AD_OC9
  selected_answer: gui
  notes: The interface discloses the page name and unique identifier, but there is
    no URL associated with the advertiser.
- code: AD_OC10
  selected_answer: 'no'
  notes: The platform only shows the final advertiser's name, not additional sponsor
    or funder information. Advertising agencies that create ads for clients are not
    displayed.
- code: AD_OC11
  selected_answer: 'no'
  notes: The platform only shows the last exhibition date, not detailed information
    on the period during which ads were served.
- code: AD_OC12
  selected_answer: 'no'
  notes: The Ads Transparency Center does not provide engagement metrics like views,
    clicks, or interactions.
- code: AD_OC13
  selected_answer: gui
  notes: In Brazil, the platform only shows ads from verified advertisers. In Europe
    and Turkey, ads from non-verified advertisers are included as well.
compliance_answers:
- code: AD_OC14
  selected_answer: 'no'
  notes: Ads removed due to policy violations are not shown in the transparency center
    and are not flagged as removed.
- code: AD_OC15
  selected_answer: 'no'
  notes: There is no indication that AI-generated content is labeled in the ad repository.
- code: AD_OC16
  selected_answer: gui
  notes: Despite being limited in scope, the [documentation](https://adstransparency.google.com/faq?region=BR)
    can be accessed without registration or login.
- code: AD_OC17
  selected_answer: gui
  notes: Despite being limited in scope, the documentation is clearly written and
    exemplified.
- code: AD_OC18
  selected_answer: gui
  notes: There is a link to its [Terms of Use](https://adstransparency.google.com/terms)
    at the footer section of the page.
- code: AD_OC19
  selected_answer: gui
  notes: Despite being limited in scope, there is documentation available in Portuguese.
- code: AD_OC20
  selected_answer: 'no'
  notes: The platform does not provide API access.
- code: AD_OC21
  selected_answer: 'no'
  notes: The platform does not provide API access.
- code: AD_OC22
  selected_answer: 'no'
  notes: The platform does not provide API access.
consistency_answers:
- code: AD_OC23
  selected_answer: 'no'
  notes: The platform does not provide API access.
- code: AD_OC24
  selected_answer: gui
  notes: We ran multiple parallel queries and confirmed that the results were consistent
    and reproducible. However, it was not possible to evaluate cases in which content
    had been deleted in the interim.
- code: AD_OC25
  selected_answer: gui
  notes: We ran multiple parallel queries and confirmed that the results were consistent
    with the parameters and filters used.
relevance_answers:
- code: AD_OC26
  selected_answer: gui
  notes: The platform supports filtering ads by date once a specific advertiser or
    target URL is selected.
- code: AD_OC27
  selected_answer: 'no'
  notes: The platform only differentiates between political and non-political ads,
    not allowing filters by ad’s categories.
- code: AD_OC28
  selected_answer: 'no'
  notes: The platform’s most specific geographic filter is by country. Therefore not
    meet the required standards of having subnational location filters.
