metadata:
  platform: Google
  region_code: EU
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: full
  notes: 'It is possible to access and extract data on ads shown across Google platforms through the [Google Big Query](https://cloud.google.com/bigquery) or via [Google Cloud Storage](https://console.cloud.google.com/storage/browser/ads-transparency-center/api-data;tab=objects?prefix=&forceOnObjectsSortingFiltering=false).'
- code: AD_SC2
  selected_answer: no
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR), a web-based interface that allows users to search for and view ads across Google products, including YouTube. The tool lets users filter results by advertiser, date range, region, and ad format to explore advertising content. However, in the EU, the Ads Transparency Center cannot be used to export data on any type of ads.
- code: AD_SC3
  selected_answer: full
  notes: We were able to successfully extract data on ads served in the EU from June 2023 to November 2025 through the [Google BigQuery](https://cloud.google.com/bigquery). Although [Google no longer allows political ads to be served in the EU](https://support.google.com/adspolicy/answer/16409999?hl=en), the API does not distinguish between political and non-political ads at the time of extraction.
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?region=GB), a web-based interface that allows users to search for and view ads across Google products, including YouTube. It includes ads from verified advertisers shown within the past 365 days (or up to seven years for political ads), as well as ads from unverified advertisers in Europe and Turkey.
- code: AD_OC2
  selected_answer: both
  notes: Both the [Ads Transparency Center](https://adstransparency.google.com) web interface and [Google BigQuery](https://cloud.google.com/bigquery) are publicly available and free to use, with no payment or subscription required, and could be properly tested and assessed.
- code: AD_OC3
  selected_answer: 'no'
  notes: Although it is possible to extract structured data on ads served to users in the EU through the [Google BigQuery](https://cloud.google.com/bigquery), it is not possible to retrieve structured information on the content of those ads, as the output only provides a URL linking to each ad’s page on the Ads Transparency Center.
- code: AD_OC4
  selected_answer: 'yes'
  notes: We did not encounter any authentication issues when using the [Google BigQuery](https://cloud.google.com/bigquery) to extract data on ads served to users in the EU, as users only need an active project on Google Cloud Platform to access and run the queries.
- code: AD_OC5
  selected_answer: both
  notes: It is possible to retrieve data for a specific ad through both the [Ads Transparency Center](https://adstransparency.google.com) and the [Google BigQuery](https://cloud.google.com/bigquery). Although the interface does not allow users to search for an ad by its ID, a specific ad can be accessed directly via its URL, which can be easily formatted.
- code: AD_OC6
  selected_answer: both
  notes: The [Ads Transparency Center](https://adstransparency.google.com) allows users to search by advertiser name or domain to view ads from advertisers that were active within the past year. It is also possible to return data on ads from specific advertisers via the [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br).
- code: AD_OC7
  selected_answer: 'no'
  notes: The [Google Ads Transparency Center](https://adstransparency.google.com) does not allow ads to be retrieved using search terms.
- code: AD_OC8
  selected_answer: 'no'
  notes: Dates are provided without time and timezone information. Also, no currency
    info is provided.
completeness_answers:
- code: AD_OC9
  selected_answer: both
  notes: The interface and the API disclose the advertiser's name, but there is no
    URL associated with the advertiser.
- code: AD_OC10
  selected_answer: api
  notes: There are fields regarding who paid for ad campaigns, but most of the time,
    it seems the value is an empty string. In our 100 samples, only 9 had filled values.
- code: AD_OC11
  selected_answer: both
  notes: The platform only shows the last exhibition date, not detailed information
    on the period during which ads were served.
- code: AD_OC12
  selected_answer: both
  notes: The data shows upper and lower bounds for ad views. No other engagement metric
    is provided.
- code: AD_OC13
  selected_answer: both
  notes: ''
compliance_answers:
- code: AD_OC14
  selected_answer: api
  notes: ''
- code: AD_OC15
  selected_answer: 'no'
  notes: There are no fields regarding AI usage for creating or modifying ads
- code: AD_OC16
  selected_answer: both
  notes: ''
- code: AD_OC17
  selected_answer: both
  notes: ''
- code: AD_OC18
  selected_answer: both
  notes: ''
- code: AD_OC19
  selected_answer: gui
  notes: The API documentation was not completely changed to the local language. Some
    menu buttons and text headers were updated, but not the bulk of the content.
- code: AD_OC20
  selected_answer: 'yes'
  notes: There is a dedicated section in the documentation for changes in the API,
    which contains "announcements about new or updated features, bug fixes, known
    issues and deprecated functionality" ([Google Cloud Console](https://console.cloud.google.com/projectselector2/bigquery/settings/user?supportedpurview=project)).
- code: AD_OC21
  selected_answer: not_applicable
  notes: There are no potential errors flagged and no examples of data, apart from
    ready-to-run sample queries.
- code: AD_OC22
  selected_answer: 'yes'
  notes: Each user is able to process 1TB of BigQuery data each month. However, this
    is not dedicated only to this dataset. It would consume the user's overall BigQuery
    quota.
consistency_answers:
- code: AD_OC23
  selected_answer: 'yes'
  notes: ''
- code: AD_OC24
  selected_answer: gui
  notes: We ran multiple parallel queries and confirmed that the results were consistent
    and reproducible. However, it was not possible to evaluate cases in which content
    had been deleted in the interim.
- code: AD_OC25
  selected_answer: gui
  notes: We ran multiple parallel queries and confirmed that the results were consistent
    with the parameters and filters used.
relevance_answers:
- code: AD_OC26
  selected_answer: both
  notes: ''
- code: AD_OC27
  selected_answer: api
  notes: In the GUI, the platform only differentiates between political and non-political
    ads.
- code: AD_OC28
  selected_answer: 'no'
  notes: Filtering only works at the country level.
accuracy_answers:
- code: AD_OC29
  selected_answer: 'no'
  notes: ''
- code: AD_OC30
  selected_answer: 'no'
  notes: Information is only available at the country level and above.
- code: AD_OC31
  selected_answer: 'no'
  notes: It only specifies whether targeting criteria across multiple categories (demographic,
    geolocation, contextual signals, customer lists, and topics of interest) were
    used or not. It does not specify which settings were used.
- code: AD_OC32
  selected_answer: 'no'
  notes: The audience engagement metrics are provided in larger intervals than specified
    in the question.
- code: AD_OC33
  selected_answer: 'no'
  notes: There are no fields regarding ad spending.
