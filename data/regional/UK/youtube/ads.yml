metadata:
  platform: Google
  region_code: UK
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: Google's Ads Transparency Center data is offered in a public dataset, accessible
    via BigQuery. However, it does not include data for the UK.
- code: AD_SC2
  selected_answer: partial
  notes: Google offers an Ads Transparency Center GUI, but its export functionality
    is only available for political ads.
- code: AD_SC3
  selected_answer: 'no'
  notes: ''
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: Google's Ads Transparency Center (GUI) provides more detailed information
    on political ads; however, it meets the criterion of providing information on
    both active and inactive ads. It is possible to search and view ad content.
- code: AD_OC2
  selected_answer: gui
  notes: ''
- code: AD_OC3
  selected_answer: 'no'
  notes: It is only possible to export political ads' data.
- code: AD_OC4
  selected_answer: 'no'
  notes: There is no API.
- code: AD_OC5
  selected_answer: 'no'
  notes: The Ads Transparency Center GUI only allows searching by advertiser name
    or candidate name (for political ads). It is not possible to search for one specific
    ad.
- code: AD_OC6
  selected_answer: gui
  notes: ''
- code: AD_OC7
  selected_answer: 'no'
  notes: The Ads Transparency Center GUI only allows searching by advertiser name
    or candidate name (for political ads).
- code: AD_OC8
  selected_answer: 'no'
  notes: When filtering by date, a note states that the data is based on Pacific Time
    (PT). There is no such indication in the actual ad entries.
completeness_answers:
- code: AD_OC9
  selected_answer: gui
  notes: The interface discloses the page name and unique identifier, but there is
    no URL associated with the advertiser.
- code: AD_OC10
  selected_answer: 'no'
  notes: ''
- code: AD_OC11
  selected_answer: 'no'
  notes: The interval in which the ads ran is only available for political ads. Other
    categories only include the date when it was last shown.
- code: AD_OC12
  selected_answer: 'no'
  notes: The only metric available is the number of views (as a range), but only for
    political ads.
- code: AD_OC13
  selected_answer: gui
  notes: However, this information is displayed only in the advertiser's profile,
    not in the individual ad record.
